
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registro de huespedes - Duplex Poble Sec</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#111;min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:1.25rem 1rem 3rem;}
.lbar{display:flex;gap:6px;margin-bottom:1.25rem;}
.lb{flex:1;padding:8px 2px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#666;text-align:center;}
.lb.on{border-color:#111;background:#f0f0f0;color:#111;font-weight:600;}
.hero{border-radius:12px;overflow:hidden;margin-bottom:1.25rem;position:relative;height:140px;background:#2d3a4a;}
.hero img{width:100%;height:100%;object-fit:cover;display:block;}
.hov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.62) 0%,transparent 55%);}
.htx{position:absolute;bottom:0;left:0;right:0;padding:13px 15px;}
.hn{font-size:15px;font-weight:600;color:#fff;line-height:1.3;}
.prog{display:flex;gap:5px;margin-bottom:1.5rem;}
.dot{height:4px;border-radius:2px;flex:1;background:#ddd;}.dot.on{background:#111;}
.wbox{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;border:1px solid #eee;}
.wbox p{font-size:13px;color:#555;margin-bottom:0.6rem;line-height:1.6;}
.wbox p:last-child{margin-bottom:0;}
.wthanks{font-size:13px;font-weight:600;color:#111!important;margin-top:0.75rem!important;padding-top:0.75rem;border-top:1px solid #eee;}
.shdr{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin:1.25rem 0 0.75rem;padding-bottom:6px;border-bottom:1px solid #eee;}
.fi{margin-bottom:13px;}
.fi label{display:block;font-size:13px;color:#555;margin-bottom:4px;}
.fi input,.fi select{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#111;-webkit-appearance:none;}
.fi input:focus,.fi select:focus{outline:none;border-color:#111;}
.fi .hint{font-size:11px;color:#999;margin-top:3px;line-height:1.4;}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gc{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem;margin-bottom:1rem;}
.gt{font-size:14px;font-weight:600;color:#111;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.bt{background:#E1F5EE;color:#0F6E56;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.ba{background:#E6F1FB;color:#185FA5;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.bp{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:0.5rem;}
.bp:active{opacity:0.85;}
.bp:disabled{opacity:0.5;}
.bs{width:100%;padding:10px;background:transparent;border:1px solid #ccc;border-radius:10px;font-size:14px;cursor:pointer;color:#111;margin-top:8px;}
.sbox{background:#f0faf5;border:1px solid #a3d9be;border-radius:12px;padding:1rem 1.25rem;}
.sok{font-weight:600;font-size:15px;margin-bottom:8px;color:#0F6E56;}
.tp{font-family:monospace;font-size:10px;background:#f5f5f5;border-radius:8px;padding:8px;color:#333;white-space:pre;overflow-x:auto;margin-top:6px;}
.step{display:none;}.step.on{display:block;}
.bdl{width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:1rem;}
.bdl:disabled{opacity:0.6;}
</style>
</head>
<body>
<div class="wrap">
<div class="lbar">
  <button class="lb on" onclick="sL('es')">ES</button>
  <button class="lb" onclick="sL('en')">EN</button>
  <button class="lb" onclick="sL('fr')">FR</button>
  <button class="lb" onclick="sL('de')">DE</button>

<div class="hero">

    <div class="fi"><label id="lhout"></label><input type="time" id="hOut" value="12:00"/></div>
  </div>

    </select>
  </div>
  <button class="bp" id="bcont" onclick="go()"></button>
</div>
<div class="step" id="sg"></div>
<div class="step" id="sd">
  <div class="sbox">
    <p id="sendStatus" style="font-size:18px;font-weight:600;text-align:center;color:#0F6E56;min-height:28px;margin-bottom:1rem;"></p>
    <button class="bdl" id="btnSend" onclick="enviarDatos()"><span id="bdl"></span></button>
    <button class="bs" onclick="rst()" id="bnw" style="margin-top:1rem;"></button>
  </div>
</div>
</div>

  de:{wp1:"Wir freuen uns, Sie in unserem Fantastischen Duplex Estilo Loft in Barcelona begrussen zu durfen und hoffen, dass Sie einen angenehmen Aufenthalt geniessen.",wp2:"Gemas den ortlichen Vorschriften mussen alle Gaste ein Anmeldeformular ausfuellen. Diese Informationen werden an die Behorden weitergeleitet.",wp3:"Bitte fullen Sie das Formular so bald wie moglich aus, auch fur alle Mitreisenden. Minderjahrige mussen ebenfalls registriert werden.",wp4:"Ihre Daten werden ausschliesslich fur die Registrierung verwendet. Bei Fragen kontaktieren Sie uns.",wth:"Vielen Dank. Geniessen Sie Ihren Aufenthalt!",res:"Buchungsdetails",ref:"Buchungsreferenz *",ent:"Anreisedatum *",sal:"Abreisedatum *",hin:"Anreisezeit *",hout:"Abreisezeit *",num:"Anzahl Gaste *",tpago:"Zahlungsart *",sel:"Auswahlen...",cont:"Weiter",hue:"Gast",de:"von",tit:"Hauptgast",aco:"Begleitung",nom:"Vorname *",a1:"Erster Nachname *",a2:"Zweiter Nachname",sx:"Geschlecht",td:"Dokumententyp *",nd:"Dokumentennummer *",sop:"Seriennummer",fexp:"Ausstellungsdatum",fn:"Geburtsdatum *",nac:"Nationalitat ISO *",res2:"Anschrift *",cp:"Postleitzahl *",loc:"Stadt *",pais:"Land ISO *",em:"E-Mail",tel:"Telefon",htel:"Jedes Format - wird automatisch konvertiert",par:"Verhaltnis Hauptgast *",sig:"Nachster Gast",fin:"Abschliessen",ok:"Registrierung abgeschlossen",rdy:"Druecken Sie den Knopf, um die Daten zu senden.",dl:"Daten senden",sending:"Daten werden gesendet...",sent:"Daten erfolgreich gesendet",fallback:"Sendefehler. Bitte kontaktieren Sie uns.",nw:"Neue Registrierung",sm:"Mannlich",sf:"Weiblich",so:"Andere",af:"Bitte alle Pflichtfelder ausfuellen (*)",ar:"Bitte alle Buchungsdetails ausfuellen."}
};

let lang="es",nG=0,cur=0,gD=[],seq=1;
const t=k=>TX[lang][k]||"";

function sL(l){lang=l;document.querySelectorAll(".lb").forEach((b,i)=>b.classList.toggle("on",["es","en","fr","de"][i]===l));aL();}

function aL(){
  const m={wp1:"wp1",wp2:"wp2",wp3:"wp3",wp4:"wp4",wth:"wth",lres:"res",lref:"ref",lin:"ent",lout:"sal",lhin:"hin",lhout:"hout",lnum:"num",ltpago:"tpago",osel:"sel",bcont:"cont",lok:"ok",lrdy:"rdy",bdl:"dl",bnw:"nw"};
  for(const[id,k]of Object.entries(m)){const el=document.getElementById(id);if(el)el.textContent=t(k);}
  const pg=PAGO[lang];
  Object.keys(pg).forEach(v=>{const el=document.getElementById("op_"+v);if(el)el.textContent=pg[v];});
}

function upProg(tot,c){const p=document.getElementById("prog");p.innerHTML="";for(let i=0;i<tot+2;i++){const d=document.createElement("div");d.className="dot"+(i<=c?" on":"");p.appendChild(d);}}

function go(){
  const ref=document.getElementById("ref").value.trim();
  const fi=document.getElementById("fIn").value;
  const fo=document.getElementById("fOut").value;
  const n=parseInt(document.getElementById("nG").value);
  if(!ref||!fi||!fo||!n){alert(t("ar"));return;}
  nG=n;cur=0;gD=[];
  document.getElementById("s0").className="step";
  showG();
}

function normTel(raw){
  if(!raw||!raw.trim())return "";
  let s=raw.trim();
  if(s.startsWith("+"))s="00"+s.slice(1);
  s=s.replace(/[\s\-\(\)\.]/g,"");
  if(s.startsWith("00"))return s;
  return s;
}

function showG(){
  upProg(nG,cur+1);
  const isT=cur===0;
  const pOpts=PAR[lang].map(([v,lb])=>`<option value="${v}">${lb}</option>`).join("");
  const dOpts=DOC[lang].map(([v,lb])=>`<option value="${v}">${lb}</option>`).join("");
  const sg=document.getElementById("sg");
  sg.innerHTML=`<div class="gc">
    <div class="gt">${t("hue")} ${cur+1} ${t("de")} ${nG} <span class="${isT?"bt":"ba"}">${isT?t("tit"):t("aco")}</span></div>
    <div class="tc">
      <div class="fi"><label>${t("nom")}</label><input type="text" id="gnom"/></div>
      <div class="fi"><label>${t("a1")}</label><input type="text" id="ga1"/></div>
    </div>
    <div class="tc">
      <div class="fi"><label>${t("a2")}</label><input type="text" id="ga2"/><div class="hint">Opcional</div></div>
      <div class="fi"><label>${t("sx")}</label><select id="gsx"><option value="">--</option><option value="M">${t("sm")}</option><option value="F">${t("sf")}</option><option value="O">${t("so")}</option></select><div class="hint">Opcional</div></div>
    </div>
    <div class="tc">
      <div class="fi"><label>${t("td")}</label><select id="gtd">${dOpts}</select></div>
      <div class="fi"><label>${t("nd")}</label><input type="text" id="gnd" placeholder="12345678Z"/></div>
    </div>
    <div class="tc">
      <div class="fi"><label>${t("sop")}</label><input type="text" id="gsop" maxlength="9"/><div class="hint">Solo DNI/NIE. 9 car. Opcional</div></div>
      <div class="fi"><label>${t("fexp")}</label><input type="date" id="gfexp"/><div class="hint">Opcional</div></div>
    </div>
    <div class="tc">
      <div class="fi"><label>${t("fn")}</label><input type="date" id="gfn"/></div>
      <div class="fi"><label>${t("nac")}</label><input type="text" id="gnac" maxlength="3"/><div class="hint">ESP USA FRA DEU GBR...</div></div>
    </div>
    <div class="fi"><label>${t("res2")}</label><input type="text" id="gres"/></div>
    <div class="tc">
      <div class="fi"><label>${t("cp")}</label><input type="text" id="gcp"/></div>
      <div class="fi"><label>${t("loc")}</label><input type="text" id="gloc"/></div>
    </div>
    <div class="fi"><label>${t("pais")}</label><input type="text" id="gpais" maxlength="3"/><div class="hint">ISO 3166-1 Alfa-3</div></div>
    <div class="fi"><label>${t("em")}</label><input type="email" id="gem"/><div class="hint">Opcional (necesario email o telefono)</div></div>
    <div class="fi"><label>${t("tel")}</label><input type="tel" id="gtel" onblur="this.value=normTel(this.value)"/><div class="hint">${t("htel")}</div></div>
    ${!isT?`<div class="fi"><label>${t("par")}</label><select id="gpar">${pOpts}</select></div>`:`<input type="hidden" id="gpar" value=""/>`}
  </div>
  <button class="bp" onclick="svG()">${cur<nG-1?t("sig"):t("fin")}</button>`;
  sg.className="step on";
}

function svG(){
  const req=["gnom","ga1","gtd","gnd","gfn","gnac","gres","gcp","gloc","gpais"];
  const d={nom:v("gnom"),a1:v("ga1"),a2:v("ga2")||"",sx:v("gsx")||"",td:v("gtd")||"P",nd:v("gnd"),sop:v("gsop")||"",fexp:v("gfexp")||"",fn:v("gfn"),nac:v("gnac"),res:v("gres"),cp:v("gcp"),loc:v("gloc"),pais:v("gpais"),em:v("gem")||"",tel:normTel(v("gtel")),par:v("gpar")||""};
  if(req.some(id=>!v(id))){alert(t("af"));return;}
  if(!d.em&&!d.tel){alert(t("af")+" (email / "+t("tel")+")");return;}
  gD.push(d);cur++;
  if(cur<nG)showG();
  else{document.getElementById("sg").className="step";genTxt();}
}

function v(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function fmtD(d){return d?d.replace(/-/g,""):"";}
function fmtH(h){return h?h.replace(":",""):"0000";}
function nowDT(){const n=new Date(),p=x=>String(x).padStart(2,"0");return{d:`${n.getFullYear()}${p(n.getMonth()+1)}${p(n.getDate())}`,h:`${p(n.getHours())}${p(n.getMinutes())}`};}

function genTxt(){
  const ref=document.getElementById("ref").value.trim();
  const fIn=document.getElementById("fIn").value;
  const fOut=document.getElementById("fOut").value;
  const hIn=fmtH(document.getElementById("hIn").value||"15:00");
  const hOut=fmtH(document.getElementById("hOut").value||"12:00");
  const tpago=document.getElementById("tpago").value||"PLATF";
  const fn=`${COD_EST}.${String(seq).padStart(3,"0")}.txt`;
  const {d:nd,h:nh}=nowDT();
  const n=gD.length;
  const L1=`1|${COD_EST}|${NOM_EST}|${nd}|${nh}|${n}|V24`;
  const lines=[L1];
  gD.forEach((g,i)=>{
    const td=g.td||"P";
    const esSpain=(g.pais||"").toUpperCase()==="ESP";
    const sop=(td==="D"||td==="N")&&g.sop&&g.sop.length===9?g.sop.toUpperCase():"";
    const fields=["2",(td==="D")?g.nd.toUpperCase():"",(td!=="D")?g.nd.toUpperCase():"",td,fmtD(g.fexp),g.a1.toUpperCase(),g.a2.toUpperCase(),g.nom.toUpperCase(),g.sx,fmtD(g.fn),(g.nac||"").toUpperCase(),fmtD(fIn),hIn,fmtD(fOut),hOut,nd,"R",ref,String(n),"1","S",tpago,g.tel,(i===0)?"":g.par,g.em,sop,g.res,esSpain?PROV_BCN:"",esSpain?MUN_BCN:"",esSpain?"":g.loc,(g.pais||"").toUpperCase(),g.cp];
    lines.push(fields.join("|"));
  });
  window._tc=lines.join("\r\n");
  window._fn=fn;
  upProg(nG,nG+2);aL();
  document.getElementById("sd").className="step on";
}

async function enviarDatos(){
  const btn=document.getElementById("btnSend");
  const status=document.getElementById("sendStatus");
  btn.disabled=true;
  status.style.color="#555";
  status.textContent=t("sending");
  try{
    const resp=await fetch(WEBHOOK,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({filename:window._fn,content:window._tc,timestamp:new Date().toISOString()})
    });
    if(resp.ok){
      status.style.color="#0F6E56";
      status.textContent=t("sent");
      btn.style.display="none";
    }else{throw new Error(resp.status);}
  }catch(e){
    status.style.color="#c0392b";
    status.textContent=t("fallback");
    btn.disabled=false;
  }
  seq=seq<999?seq+1:1;
}

function rst(){
  document.getElementById("sd").className="step";
  document.getElementById("s0").className="step on";
  ["ref","fIn","fOut"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("nG").value="";
  document.getElementById("sendStatus").textContent="";
  gD=[];cur=0;upProg(1,0);
}

sL("es");upProg(1,0);
</script>
